<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- Loading screen that shows while app loads -->
    <div id="app-loading" style="position: fixed; inset: 0; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
      <div style="width: 120px; height: 120px; background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%); border-radius: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); position: relative; overflow: hidden;">
        <!-- The O ring -->
        <svg width="90" height="90" viewBox="0 0 100 100" style="position: absolute;">
          <ellipse cx="55" cy="50" rx="35" ry="38" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>
        </svg>
        <!-- Animated running man -->
        <div class="runner-container">
          <svg class="runner" width="70" height="70" viewBox="0 0 100 100" fill="white">
            <!-- Head -->
            <circle cx="55" cy="22" r="10"/>
            <!-- Body -->
            <path d="M55 32 L55 55" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <!-- Arms - animated -->
            <g class="arms">
              <path d="M55 38 L35 50" stroke="white" stroke-width="5" stroke-linecap="round"/>
              <path d="M55 38 L72 28" stroke="white" stroke-width="5" stroke-linecap="round"/>
            </g>
            <!-- Legs - animated -->
            <g class="legs">
              <path d="M55 55 L35 78" stroke="white" stroke-width="5" stroke-linecap="round"/>
              <path d="M55 55 L75 72" stroke="white" stroke-width="5" stroke-linecap="round"/>
            </g>
          </svg>
        </div>
        <!-- Speed lines -->
        <div class="speed-lines">
          <div class="speed-line line1"></div>
          <div class="speed-line line2"></div>
          <div class="speed-line line3"></div>
        </div>
      </div>
      <h1 style="color: white; font-family: system-ui, -apple-system, sans-serif; font-size: 36px; font-weight: 800; margin: 0 0 8px 0; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">OGym</h1>
      <p style="color: rgba(255,255,255,0.9); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; margin: 0 0 32px 0;">Your Fitness Journey</p>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <style>
        .runner-container {
          position: relative;
          animation: runBounce 0.4s ease-in-out infinite;
        }
        @keyframes runBounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-3px); }
        }
        .runner .arms {
          animation: swingArms 0.4s ease-in-out infinite;
          transform-origin: 55px 38px;
        }
        @keyframes swingArms {
          0%, 100% { transform: rotate(-5deg); }
          50% { transform: rotate(5deg); }
        }
        .runner .legs {
          animation: swingLegs 0.4s ease-in-out infinite;
          transform-origin: 55px 55px;
        }
        @keyframes swingLegs {
          0%, 100% { transform: rotate(5deg); }
          50% { transform: rotate(-5deg); }
        }
        .speed-lines {
          position: absolute;
          left: 8px;
          top: 50%;
          transform: translateY(-50%);
        }
        .speed-line {
          width: 15px;
          height: 3px;
          background: rgba(255,255,255,0.7);
          border-radius: 2px;
          margin: 6px 0;
          animation: speedPulse 0.6s ease-in-out infinite;
        }
        .line1 { animation-delay: 0s; }
        .line2 { animation-delay: 0.2s; width: 10px; }
        .line3 { animation-delay: 0.4s; width: 8px; }
        @keyframes speedPulse {
          0%, 100% { opacity: 0.3; transform: translateX(0); }
          50% { opacity: 0.9; transform: translateX(-5px); }
        }
        .loading-dots {
          display: flex;
          gap: 8px;
        }
        .loading-dots span {
          width: 10px;
          height: 10px;
          background: white;
          border-radius: 50%;
          animation: dotPulse 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
          0%, 100% { transform: scale(0.7); opacity: 0.5; }
          50% { transform: scale(1); opacity: 1; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
