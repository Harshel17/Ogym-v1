<html lang="en">

  </head>
  <body>
    <div id="root"></div>
    <!-- Loading screen that shows while app loads -->
    <div id="app-loading" style="position: fixed; inset: 0; background: linear-gradient(135deg, #4F46E5 0%, #6366F1 50%, #818CF8 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
      <div style="width: 80px; height: 80px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 6.5c1.5 0 3-1.5 3-3"/>
          <path d="M14.5 6.5c-1.5 0-3-1.5-3-3"/>
          <path d="M8.5 12c-1.5 0-2.5-1-3.5-2"/>
          <path d="M15.5 12c1.5 0 2.5-1 3.5-2"/>
          <circle cx="10.5" cy="10" r="6"/>
        </svg>
      </div>
      <h1 style="color: white; font-family: system-ui, -apple-system, sans-serif; font-size: 32px; font-weight: 700; margin: 0 0 8px 0; letter-spacing: -0.5px;">OGym</h1>
      <p style="color: rgba(255,255,255,0.8); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; margin: 0 0 32px 0;">Your Fitness Journey</p>
      <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
